# Use wildcard "*" to expose all endpoints
# Can also expose individual endpoints with comma-delimited list
spring.application.name=mycoolapp

management.endpoints.web.exposure.include=*
management.info.env.enabled=true

# Exclude include endpoints with comma-delimited list
# management.endpoints.web.exposure.exclude=health,info

info.app.name=My Super Cool App
info.app.description=A crazy fun app , yoohoo !
info.app.version=1.0.0

#
# Defining my own custom properties
#

coach.name=Mickey Mouse
team.name=The mouse club

# Changing Spring Boot embedded server
server.port=7070

# After changing context path all request prefixed with /mycoolapp
server.servlet.context-path=/mycoolapp