<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Employee Directory</title>
</head>
<body>
<div class="container">

  <h3>Employee Directory</h3>
  <hr>

  <!-- Add a button -->
  <a th:href="@{/employees/showFormForAdd}"
     class="btn btn-primary btn-sm mb-3">
    Add Employee
  </a>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr th:each="tempEmployee : ${employees}">
        <td th:text="${tempEmployee.firstName}" />
        <td th:text="${tempEmployee.lastName}" />
        <td th:text="${tempEmployee.email}" />

        <!-- Add update button link -->
        <td>
          <div class="d-flex gap-2">
          <form action="#" th:action="@{/employees/showFormForUpdate}" method="POST">

            <input type="hidden" name="employeeId" th:value="${tempEmployee.id}" />
            <button type="submit" class="btn btn-info btn-sn">Update</button>

          </form>

          <!-- Add a delete button link -->
          <form action="#" th:action="@{/employees/delete}" method="POST">

            <input type="hidden" name="employeeId" th:value="${tempEmployee.id}" />
            <button type="submit" class="btn btn-danger btn-sn"
                    onclick="if(!(confirm('Are you sure you want to delete the employee'))) return false">
                    Delete
            </button>
          </form>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
